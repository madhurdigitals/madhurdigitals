<!DOCTYPE html>
<html>
<head>
  <title>Select School</title>
</head>
<body>

<h2>Select School</h2>

<select id="school">
  <option value="">Loading...</option>
</select>

<br><br>
<button onclick="go()">Continue</button>

<script>

let schoolsData = [];

// Load schools from JSON
async function loadSchools() {
  const res = await fetch("schools.json");
  schoolsData = await res.json();

  const dropdown = document.getElementById("school");

  dropdown.innerHTML = '<option value="">Select School</option>';

  dropdown.innerHTML += schoolsData.map(s => `
    <option value="${s.School}">
      ${s.School_Name}
    </option>
  `).join("");
}

loadSchools();

function go() {
  const school = document.getElementById("school").value;

  if (!school) {
    alert("Please select a school");
    return;
  }

  // Save EXACT sheet name (important for backend)
  localStorage.setItem("school", school);

  window.location.href = "dashboard.html";
}

</script>

</body>
</html>
