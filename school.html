<!DOCTYPE html>
<html>
<head>
  <title>Select School</title>
</head>
<body>

<h2>Select School</h2>

<select id="school">
  <option value="DAV">D.A.V. Public School Asopur</option>
  <option value="RAV">R.A.V. Public School Iltifatganj</option>
</select>

<br><br>
<button onclick="go()">Continue</button>

<script>
function go() {
  const school = document.getElementById("school").value;
  localStorage.setItem("school", school);
  window.location.href = "dashboard.html";
}
</script>

</body>
</html>
