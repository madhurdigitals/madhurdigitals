<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link rel="stylesheet" href="css/dashboard.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div class="title-text">Madhur Digitals</div>
  </div>

  <div class="nav-actions">
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<h2 class="heading">Dashboard</h2>

<div class="container">

  <!-- Add Students -->
  <div class="card" onclick="showSchoolSelector()">
    <h3>➕ Add Students</h3>
    <p>Add new student records</p>
  </div>

  <!-- Manage Students -->
  <div class="card" onclick="goManage()">
    <h3>🧾 Manage Students</h3>
    <p>View and edit students</p>
  </div>

  <!-- Print Students -->
  <div class="card" onclick="goPrint()">
    <h3>🖨 Print Students</h3>
    <p>Generate ID cards</p>
  </div>

  <!-- Bulk Upload -->
  <div class="card" onclick="showSchoolSelector('bulk')">
  <h3>📤 Bulk Upload Students</h3>
  <p>Upload students using Excel or CSV</p>
  </div>

</div>

<!-- School Selector -->
<div id="schoolBox" class="school-box">
  <h3>Select School</h3>

  <select id="schoolSelect">
    <option value="">Loading...</option>
  </select>

  <br><br>
  <button onclick="continueToAdd()">Continue</button>
</div>

<script>
let mode = "";
// Load schools
async function loadSchools() {
  const res = await fetch("schools.json");
  const data = await res.json();

  const dropdown = document.getElementById("schoolSelect");

  dropdown.innerHTML = '<option value="">Select School</option>';

  dropdown.innerHTML += data.map(s => `
  <option value="${s.School}" data-id="${s.School_ID}">
    ${s.School_Name}
  </option>
`).join("");
}

loadSchools();

// Show selector
function showSchoolSelector() {
  mode = "add";
  document.getElementById("schoolBox").style.display = "block";
}

// Continue
function continueToAdd() {
  const dropdown = document.getElementById("schoolSelect");
  const selectedOption = dropdown.options[dropdown.selectedIndex];

  const school = selectedOption.value;
  const school_id = selectedOption.getAttribute("data-id");

  if (!school) {
    alert("Please select a school");
    return;
  }

  // ✅ Store both values
  sessionStorage.setItem("school", school);
  sessionStorage.setItem("school_id", school_id);

  // ✅ Redirect based on mode
  if (mode === "add") {
    window.location.href = "add_student.html";
  } 
  else if (mode === "manage") {
    window.location.href = "manage_student.html";
  } 
  else if (mode === "print") {
    window.location.href = "print_student.html";
  }
}

// Other buttons
function goManage() {
  mode = "manage";
  document.getElementById("schoolBox").style.display = "block";
}

function goPrint() {
  mode = "print";
  document.getElementById("schoolBox").style.display = "block";
}

// Hide popup
function hideSchoolSelector() {
  document.getElementById("schoolBox").style.display = "none";
  mode = "";
}

// ESC key close
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    hideSchoolSelector();
  }
});

// Click outside close
document.addEventListener("click", function(e) {
  const box = document.getElementById("schoolBox");
  const card = e.target.closest(".card");

  if (
    box.style.display === "block" &&
    !box.contains(e.target) &&
    !card
  ) {
    hideSchoolSelector();
  }
});

</script>

</body>
</html>
