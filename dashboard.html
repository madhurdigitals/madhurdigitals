<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f5f7fb;
}

/* NAV */
nav {
  background: #0d6efd;
  color: white;
  padding: 15px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

nav button {
  margin-left: 10px;
  padding: 6px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 30px auto;
  padding: 20px;
}

/* FORM CARD */
.card {
  background: white;
  padding: 25px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  margin-bottom: 30px;
}

.card h3 {
  margin-bottom: 15px;
}

/* INPUTS */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* BUTTON */
.submit-btn {
  width: 100%;
  padding: 12px;
  background: #0d6efd;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin-top: 10px;
}

.submit-btn:hover {
  background: #0b5ed7;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

th {
  background: #f1f3f5;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav>
  <span id="title"></span>
  <div>
    <button onclick="changeSchool()">Change School</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- FORM -->
  <div class="card">
    <h3>Add Student</h3>

    <input id="name" placeholder="Student Name">
    <input id="class" placeholder="Class">
    <input id="section" placeholder="Section">
    <input id="roll" placeholder="Roll Number">
    <input id="phone" placeholder="Phone">
    <input id="address" placeholder="Address">

    <button class="submit-btn" onclick="submitStudent()">Submit</button>
  </div>

  <!-- RECENT ENTRIES -->
  <div class="card">
    <h3>Recent Entries</h3>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Class</th>
          <th>Section</th>
        </tr>
      </thead>
      <tbody id="recentTable"></tbody>
    </table>
  </div>

</div>

<script>
const school = localStorage.getItem("school");

if (!school) {
  window.location.href = "school.html";
}

document.getElementById("title").innerText = "School: " + school;

function changeSchool() {
  window.location.href = "school.html";
}

/**
 * Submit Student
 */
async function submitStudent() {
  const data = {
    school: school,
    name: document.getElementById("name").value,
    class: document.getElementById("class").value,
    section: document.getElementById("section").value,
    roll: document.getElementById("roll").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  await addStudent(data);

  alert("Student Added Successfully");

  loadData();
}

/**
 * Format Data
 */
function formatData(rows) {
  const headers = rows[0];

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = row[i];
    });
    return obj;
  });
}

/**
 * Load Data
 */
async function loadData() {
  const raw = await getStudents(school);

  if (!raw || raw.length === 0) {
    document.getElementById("recentTable").innerHTML =
      "<tr><td colspan='3'>No data found</td></tr>";
    return;
  }

  const students = formatData(raw);

  const last3 = students.slice(-3).reverse();

  document.getElementById("recentTable").innerHTML =
    last3.map(s => `
      <tr>
        <td>${s.Name}</td>
        <td>${s.Class}</td>
        <td>${s.Section}</td>
      </tr>
    `).join("");
}

loadData();
</script>

</body>
</html>
