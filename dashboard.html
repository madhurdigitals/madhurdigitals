<select id="school">
  <option value="DAV">DAV</option>
  <option value="RAV">RAV</option>
</select>

<input id="name" placeholder="Name">
<input id="class" placeholder="Class">
<input id="section" placeholder="Section">
<input id="roll" placeholder="Roll">

<button onclick="submitStudent()">Add Student</button>

<hr>

<select id="schoolFilter">
  <option value="DAV">DAV</option>
  <option value="RAV">RAV</option>
</select>

<button onclick="loadStudents()">Load Students</button>

<div id="students"></div>

<script src="api.js"></script>

<script>
async function submitStudent() {
  const data = {
    school: document.getElementById("school").value,
    name: document.getElementById("name").value,
    class: document.getElementById("class").value,
    section: document.getElementById("section").value,
    roll: document.getElementById("roll").value
  };

  const res = await addStudent(data);

  if (res.status === "success") {
    alert("Student Added ✅");
  } else {
    alert("Error: " + res.error);
  }
}

// ✅ LOAD STUDENTS
async function loadStudents() {
  const school = document.getElementById("schoolFilter").value;

  const res = await getStudents(school);

  const container = document.getElementById("students");
  container.innerHTML = "";

  res.students.forEach(s => {
    container.innerHTML += `
      <div style="border:1px solid #ccc; margin:5px; padding:5px;">
        <b>${s.student_id}</b> - ${s.name} (${s.class}-${s.section})
      </div>
    `;
  });
}
</script>
