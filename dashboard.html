<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
</head>
<body>

<h2 id="title"></h2>
<button onclick="changeSchool()">Change School</button>
<button onclick="logout()">Logout</button>

<hr>

<h3>Add Student</h3>

<input id="name" placeholder="Name"><br>
<input id="class" placeholder="Class"><br>
<input id="section" placeholder="Section"><br>
<input id="roll" placeholder="Roll"><br>
<input id="phone" placeholder="Phone"><br>
<input id="address" placeholder="Address"><br><br>

<button onclick="submitStudent()">Submit</button>

<h3>Last 3 Students</h3>
<div id="last3"></div>

<h3>All Students</h3>
<div id="all"></div>

<script>
const school = localStorage.getItem("school");

if (!school) {
  window.location.href = "school.html";
}

document.getElementById("title").innerText = "School: " + school;

function changeSchool() {
  window.location.href = "school.html";
}

/**
 * ✅ Submit Student
 */
async function submitStudent() {
  const data = {
    school: school,
    name: document.getElementById("name").value,
    class: document.getElementById("class").value,
    section: document.getElementById("section").value,
    roll: document.getElementById("roll").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  const res = await addStudent(data);

  alert("Student Added Successfully");

  loadData();
}

/**
 * ✅ Convert sheet array → object
 */
function formatData(rows) {
  const headers = rows[0];

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => {
      obj[h] = row[i];
    });
    return obj;
  });
}

/**
 * ✅ Load Data
 */
async function loadData() {
  const raw = await getStudents(school);

  if (!raw || raw.length === 0) {
    document.getElementById("all").innerHTML = "No data found";
    return;
  }

  const students = formatData(raw);

  // ✅ All Students
  document.getElementById("all").innerHTML =
    students.map(s => `
      <p>
        ${s.Name} | Class: ${s.Class} | Roll: ${s.Roll}
      </p>
    `).join("");

  // ✅ Last 3 Students
  const last3 = students.slice(-3).reverse();

  document.getElementById("last3").innerHTML =
    last3.map(s => `
      <p>
        ${s.Name} | Class: ${s.Class}
      </p>
    `).join("");
}

loadData();
</script>

</body>
</html>
