<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- JS -->
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
</head>

<body>

<div class="container">

<h2 id="title"></h2>

<button onclick="changeSchool()">Change School</button>
<button onclick="logout()">Logout</button>

<hr>

<h3>Add Student</h3>

<input id="name" placeholder="Name"><br>
<input id="class" placeholder="Class"><br>
<input id="section" placeholder="Section"><br>
<input id="roll" placeholder="Roll"><br>
<input id="phone" placeholder="Phone"><br>
<input id="address" placeholder="Address"><br>
<input type="file" id="photo"><br><br>

<button onclick="submitStudent()">Submit</button>

<h3>Last 3 Students</h3>
<div id="last3"></div>

<h3>All Students</h3>
<div id="all"></div>

</div>

<script>
const school = localStorage.getItem("school");

// Redirect if no school
if (!school || school === "null") {
  window.location.replace("school.html");
}

document.getElementById("title").innerText = "School: " + school;

/**
 * ✅ Change School FIXED
 */
function changeSchool() {
  localStorage.removeItem("school");
  window.location.href = "school.html";
}

/**
 * ✅ Submit Student
 */
async function submitStudent() {
  const data = {
    school: school,
    name: document.getElementById("name").value.trim(),
    class: document.getElementById("class").value.trim(),
    section: document.getElementById("section").value.trim(),
    roll: document.getElementById("roll").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    address: document.getElementById("address").value.trim()
  };

  console.log("Submitting:", data);

  const res = await addStudent(data);

  if (!res || res.error) {
    alert("Failed to add student");
    console.error(res);
    return;
  }

  const studentId = res.student_id;

  // Upload photo
  const file = document.getElementById("photo").files[0];

  if (file) {
    await uploadPhoto(file, studentId);
  }

  alert("Student Added: " + studentId);

  clearForm();
  loadData();
}

/**
 * Clear form
 */
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("class").value = "";
  document.getElementById("section").value = "";
  document.getElementById("roll").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("address").value = "";
  document.getElementById("photo").value = "";
}

/**
 * Convert Sheet → Object
 */
function formatData(rows) {
  const headers = rows[0];

  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  });
}

/**
 * Load Data
 */
async function loadData() {
  const raw = await getStudents(school);

  if (!raw || raw.length === 0) {
    document.getElementById("all").innerHTML = "No data";
    return;
  }

  const students = formatData(raw);

  // All students
  document.getElementById("all").innerHTML =
    students.map(s => `
      <div class="card">
        <b>${s.Name}</b><br>
        ID: ${s.Student_ID}<br>
        Class: ${s.Class}
      </div>
    `).join("");

  // Last 3
  const last3 = students.slice(-3).reverse();

  document.getElementById("last3").innerHTML =
    last3.map(s => `
      <div class="card">
        <b>${s.Name}</b> (${s.Student_ID})
      </div>
    `).join("");
}

loadData();
</script>

</body>
</html>
