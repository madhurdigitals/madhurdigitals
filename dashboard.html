<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <link rel="stylesheet" href="css/dashboard.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div class="title-text">Madhur Digitals</div>
  </div>

  <div class="nav-actions">
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<h2 class="heading">Dashboard</h2>

<div class="container">

  <!-- Add Students -->
  <div class="card" onclick="showSchoolSelector()">
    <h3>➕ Add Students</h3>
    <p>Add new student records</p>
  </div>

  <!-- Manage Students -->
  <div class="card" onclick="goManage()">
    <h3>🧾 Manage Students</h3>
    <p>View and edit students</p>
  </div>

  <!-- Print Students -->
  <div class="card" onclick="goPrint()">
    <h3>🖨 Print Students</h3>
    <p>Generate ID cards</p>
  </div>

</div>

<!-- School Selector -->
<div id="schoolBox" class="school-box">
  <h3>Select School</h3>

  <select id="schoolSelect">
    <option value="">Loading...</option>
  </select>

  <br><br>
  <button onclick="continueToAdd()">Continue</button>
</div>

<script>

// Load schools
async function loadSchools() {
  const res = await fetch("schools.json");
  const data = await res.json();

  const dropdown = document.getElementById("schoolSelect");

  dropdown.innerHTML = '<option value="">Select School</option>';

  dropdown.innerHTML += data.map(s => `
    <option value="${s.School}">
      ${s.School_Name}
    </option>
  `).join("");
}

loadSchools();

// Show selector
function showSchoolSelector() {
  document.getElementById("schoolBox").style.display = "block";
}

// Continue
function continueToAdd() {
  const school = document.getElementById("schoolSelect").value;

  if (!school) {
    alert("Please select a school");
    return;
  }

  // session storage (per session)
  sessionStorage.setItem("school", school);

  window.location.href = "add_student.html";
}

// Other buttons
function goManage() {
  window.location.href = "Manage_Students.html";
}

function goPrint() {
  window.location.href = "Print_Students.html";
}

</script>

</body>
</html>
