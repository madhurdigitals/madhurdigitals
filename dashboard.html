<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <link rel="stylesheet" href="css/dashboard.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
  <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div class="title-text">Madhur Digitals</div>
  </div>

  <div class="nav-actions">
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<h2 class="heading">Dashboard</h2>
<div id="selectedSchoolBar" class="selected-school" style="display:none;">
  <span id="selectedSchoolText"></span>
  <button onclick="changeSchool()">Change</button>
</div>

<div class="container">

  <!-- Add Students -->
  <div class="card" onclick="showSchoolSelector('add')">
    <h3>➕ Add Students</h3>
    <p>Add new student records</p>
  </div>

  <!-- Manage Students -->
  <div class="card" onclick="goManage('manage')">
    <h3>🧾 Manage Students</h3>
    <p>View and edit students</p>
  </div>

  <!-- Print Students -->
  <div class="card" onclick="goPrint('print')">
    <h3>🖨 Print Students</h3>
    <p>Generate ID cards</p>
  </div>

  <!-- Bulk Upload -->
  <div class="card" onclick="showSchoolSelector('bulk')">
  <h3>📤 Bulk Upload Students</h3>
  <p>Upload students using Excel or CSV</p>
  </div>

    <!-- Manage Schools -->
  <div class="card" onclick="goToSchoolManagement()">
    <h3>🏫 Manage Schools</h3>
    <p>Add and configure schools</p>
  </div>

</div>

<!-- School Selector -->
<div id="schoolBox" class="school-box">

  <div class="school-header">
    <h3>Select School</h3>
    <span class="close-btn" onclick="hideSchoolSelector()">✖</span>
  </div>

  <br>

  <select id="schoolSelect">
    <option value="">Loading...</option>
  </select>

  <br><br>

  <button onclick="continueAction()">Continue</button>
</div>

<script>
let mode = "";
// Load schools
async function loadSchools() {
  const raw = await getSchools();

  const headers = raw[0];

  const schools = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const dropdown = document.getElementById("schoolSelect");

  dropdown.innerHTML = '<option value="">Select School</option>';

  dropdown.innerHTML += schools.map(s => `
    <option value="${s.school}" data-id="${s.school_id}">
      ${s.school_name}
    </option>
  `).join("");
}

loadSchools();

// Show selector
function showSchoolSelector(selectedMode) {
  mode = selectedMode;   // dynamic mode
  document.getElementById("schoolBox").style.display = "block";
}

// Continue
function continueAction() {

  const dropdown = document.getElementById("schoolSelect");
  const selectedOption = dropdown.options[dropdown.selectedIndex];

  const school = selectedOption.value;
  const school_id = selectedOption.getAttribute("data-id");

  if (!school) {
    alert("Please select a school");
    return;
  }

  // ✅ Store both values
  sessionStorage.setItem("school", school);
  sessionStorage.setItem("school_id", school_id);
  showSelectedSchool(); 

  // ✅ Redirect based on mode
  if (mode === "add") {
    window.location.href = "add_student.html";
  } 
  else if (mode === "manage") {
    window.location.href = "manage_student.html";
  } 
  else if (mode === "print") {
    window.location.href = "print_student.html";
  }
  else if (mode === "bulk") {
    window.location.href = "bulk_upload.html";   // ✅ NEW
  }
}

// Other buttons
function goManage() {
  mode = "manage";
  document.getElementById("schoolBox").style.display = "block";
}

function goPrint() {
  mode = "print";
  document.getElementById("schoolBox").style.display = "block";
}

// Hide popup
function hideSchoolSelector() {
  document.getElementById("schoolBox").style.display = "none";
  mode = "";
}

function goToSchoolManagement() {
  window.location.href = "school_management.html";
}

// ESC key close
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    hideSchoolSelector();
  }
});

// Click outside close
document.addEventListener("click", function(e) {
  const box = document.getElementById("schoolBox");
  const card = e.target.closest(".card");

  if (
    box.style.display === "block" &&
    !box.contains(e.target) &&
    !card
  ) {
    hideSchoolSelector();
  }
});

// show overlay when popup opens
function showSchoolSelector(selectedMode) {

  const school = sessionStorage.getItem("school");

  if (school) {
    // already selected → go directly
    mode = selectedMode;
    continueAction();
    return;
  }

  mode = selectedMode;
  document.getElementById("schoolBox").style.display = "block";
}

// hide popup properly
function hideSchoolSelector() {
  document.getElementById("schoolBox").style.display = "none";
  document.body.style.overflow = "auto";
  mode = "";
}

function showSelectedSchool() {
  const school = sessionStorage.getItem("school");
  const school_id = sessionStorage.getItem("school_id");

  if (school && school_id) {
    const bar = document.getElementById("selectedSchoolBar");
    const text = document.getElementById("selectedSchoolText");

    text.innerText = `School ID: ${school_id} - ${school}`;
    bar.style.display = "flex";
  }
}

function changeSchool() {
  sessionStorage.removeItem("school");
  sessionStorage.removeItem("school_id");

  document.getElementById("selectedSchoolBar").style.display = "none";

  document.getElementById("schoolBox").style.display = "block";
}
showSelectedSchool();

</script>

</body>
</html>
