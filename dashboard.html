<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  margin: 0;
  background: #f5f7fb;
}

/* NAV */
nav {
  background: #0d6efd;
  color: white;
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 35px;
}

.title-text {
  font-weight: bold;
  font-size: 18px;
}

.school-name {
  font-size: 14px;
}

.nav-actions button {
  margin-left: 10px;
  padding: 6px 12px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

/* CONTAINER */
.container {
  max-width: 900px;
  margin: 20px auto;
  padding: 15px;
}

/* CARD */
.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  margin-bottom: 20px;
}

/* FORM ROW */
.form-row {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}

.form-row label {
  width: 150px;
  font-weight: 600;
}

.form-row input {
  flex: 1;
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* BUTTONS */
.btn-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.submit-btn {
  flex: 1;
  padding: 10px;
  background: #0d6efd;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.clear-btn {
  flex: 1;
  padding: 10px;
  background: #6c757d;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 8px;
  border-bottom: 1px solid #ddd;
}

th {
  background: #f1f3f5;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #28a745;
  color: white;
  padding: 10px 15px;
  border-radius: 6px;
  display: none;
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 600px) {

  .form-row {
    flex-direction: column;
    align-items: flex-start;
  }

  .form-row label {
    width: 100%;
    margin-bottom: 5px;
  }

  .btn-group {
    flex-direction: column;
  }

  nav {
    flex-direction: column;
    align-items: flex-start;
  }

  .nav-actions {
    margin-top: 10px;
  }
}
</style>

</head>

<body>

<nav>
  <div class="logo">
    <!-- Replace with your logo -->
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div>
      <div class="title-text">Madhur Digitals</div>
      <div class="school-name" id="schoolName"></div>
    </div>
  </div>

  <div class="nav-actions">
    <button onclick="changeSchool()">Change School</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <!-- FORM -->
  <div class="card">
    <h3>Add Student</h3>

    <div class="form-row">
      <label>Student Name</label>
      <input id="name">
    </div>

    <div class="form-row">
      <label>Class</label>
      <input id="class">
    </div>

    <div class="form-row">
      <label>Section</label>
      <input id="section">
    </div>

    <div class="form-row">
      <label>Roll Number</label>
      <input id="roll">
    </div>

    <div class="form-row">
      <label>Phone</label>
      <input id="phone" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
    </div>

    <div class="form-row">
      <label>Address</label>
      <input id="address">
    </div>

    <div class="btn-group">
      <button class="submit-btn" onclick="submitStudent()">Submit</button>
      <button class="clear-btn" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <!-- RECENT ENTRIES -->
  <div class="card">
    <h3>Recent Entries</h3>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Class</th>
          <th>Section</th>
        </tr>
      </thead>
      <tbody id="recentTable"></tbody>
    </table>
  </div>

</div>

<div id="toast">Success</div>

<script>
const school = localStorage.getItem("school");

if (!school) {
  window.location.href = "school.html";
}

document.getElementById("schoolName").innerText = "School: " + school;

function changeSchool() {
  window.location.href = "school.html";
}

/* TOAST */
function showToast(msg) {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 2000);
}

/* CLEAR FORM */
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("roll").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("address").value = "";
}

/* SUBMIT */
async function submitStudent() {
  const data = {
    school: school,
    name: document.getElementById("name").value,
    class: document.getElementById("class").value,
    section: document.getElementById("section").value,
    roll: document.getElementById("roll").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  await addStudent(data);

  showToast("Student Added");

  clearForm();

  loadData();
}

/* FORMAT */
function formatData(rows) {
  const headers = rows[0];
  return rows.slice(1).map(row => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = row[i]);
    return obj;
  });
}

/* LOAD */
async function loadData() {
  const raw = await getStudents(school);

  if (!raw || raw.length === 0) {
    document.getElementById("recentTable").innerHTML =
      "<tr><td colspan='3'>No data</td></tr>";
    return;
  }

  const students = formatData(raw);
  const last3 = students.slice(-3).reverse();

  document.getElementById("recentTable").innerHTML =
    last3.map(s => `
      <tr>
        <td>${s.Name}</td>
        <td>${s.Class}</td>
        <td>${s.Section}</td>
      </tr>
    `).join("");
}

loadData();
</script>

</body>
</html>
