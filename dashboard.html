<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <link rel="stylesheet" href="dashboard.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div>
      <div class="title-text">Madhur Digitals</div>
      <div class="school-name" id="schoolName"></div>
    </div>
  </div>

  <div class="nav-actions">
    <button onclick="changeSchool()">Change School</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container">

  <div class="card">
    <h3>Add Student</h3>

    <div class="form-row">
      <label>Student Name</label>
      <input id="name">
    </div>

    <div class="form-row">
      <label>Class</label>
      <select id="class">
        <option value="">Select Class</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
      </select>
    </div>

    <div class="form-row">
      <label>Section</label>
      <select id="section">
        <option value="">Select Section</option>
        <option value="A">A</option>
        <option value="B">B</option>
      </select>
    </div>

    <div class="form-row">
      <label>Roll Number</label>
      <input id="roll">
    </div>

    <div class="form-row">
      <label>Phone</label>
      <input id="phone">
    </div>

    <div class="form-row">
      <label>Address</label>
      <input id="address">
    </div>

    <div class="btn-group">
      <button class="submit-btn" onclick="submitStudent()">Submit</button>
      <button class="clear-btn" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <div class="card">
    <h3>Recent Entries</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Class</th>
          <th>Section</th>
        </tr>
      </thead>
      <tbody id="recentTable"></tbody>
    </table>
  </div>

</div>

<div id="toast"></div>

<script>
const school = localStorage.getItem("school");

document.getElementById("schoolName").innerText = "School: " + school;

/* TOAST */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

/* CLEAR */
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("roll").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("address").value = "";
}

/* ✅ FIXED VALIDATION */
async function submitStudent() {

  const name = document.getElementById("name").value.trim();
  const cls = document.getElementById("class").value;
  const section = document.getElementById("section").value;

  console.log("DEBUG:", name, cls, section);

  if (name === "" || cls === "" || section === "") {
    showToast("Fill required fields");
    return;
  }

  const data = {
    school: school,
    name: name,
    class: cls,
    section: section,
    roll: document.getElementById("roll").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  const res = await addStudent(data);

  showToast("Student Added");

  clearForm();
  loadData();
}

/* LOAD */
async function loadData() {
  const raw = await getStudents(school);

  const headers = raw[0];
  const students = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const last3 = students.slice(-3).reverse();

  document.getElementById("recentTable").innerHTML =
    last3.map(s => `
      <tr>
        <td>${s.Name}</td>
        <td>${s.Class}</td>
        <td>${s.Section}</td>
      </tr>
    `).join("");
}

loadData();
</script>

</body>
</html>
