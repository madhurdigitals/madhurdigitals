<!DOCTYPE html>
<html>
<head>
  <title>Bulk Upload</title>
  <script src="js/protect.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/bulk_upload.js" defer></script>

  <link rel="stylesheet" href="css/manage_student.css">
</head>

<body>

<h2>Bulk Upload Students</h2>

<div class="container">

  <!-- Upload -->
  <div class="card">
    <input type="file" id="fileInput" onchange="showLoadBtn()">
    <button id="loadBtn" onclick="loadData()" style="display:none;">
      Load Data
    </button>

    <button onclick="downloadSample()">Download Sample</button>
  </div>

  <!-- Mapping -->
  <div class="card" id="mappingBox"></div>

  <!-- Table -->
  <div class="card">
    <table>
      <thead id="tableHead"></thead>
      <tbody id="tableBody"></tbody>
    </table>

    <br>
    <div style="display:flex; gap:10px;">

      <button onclick="submitData()" class="submit-btn">
        Submit Selected
      </button>

      <button onclick="downloadExcel()" class="submit-btn">
        Download Excel
      </button>

    </div>
  </div>

</div>

</body>
</html>
