<!DOCTYPE html>
<html>
<head>
  <title>Students Entry</title>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>

  <link rel="stylesheet" href="css/add_student.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div>
      <div class="title-text">Madhur Digitals</div>
      <div class="school-name" id="schoolNameTop"></div>
    </div>
  </div>

  <div class="nav-actions">
    <button onclick="changeSchool()">Change School</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>
<h2>School: <span id="schoolName"></span></h2>
<div class="container">

  <div class="card">
    <h3>Add Student</h3>
    <h2>This is a test comment 1</h2>

    <div class="form-row">
      <label>Student Name</label>
      <input id="name">
    </div>

    <div class="form-row">
      <label>Class</label>
      <input id="class" placeholder="Enter Class (e.g. 1, 2, 10)">
    </div>

    <div class="form-row">
      <label>Section</label>
      <select id="section">
        <option value="">Select Section</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
      </select>
    </div>

    <div class="form-row">
      <label>Roll Number</label>
      <input id="roll">
    </div>

    <div class="form-row">
      <label>Phone</label>
      <input id="phone">
    </div>

    <div class="form-row">
      <label>Address</label>
      <input id="address">
    </div>

    <div class="btn-group">
      <button class="submit-btn" onclick="submitStudent()">Submit</button>
      <button class="clear-btn" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <div class="card">
    <h3>Recent Entries</h3>
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Class</th>
          <th>Section</th>
        </tr>
      </thead>
      <tbody id="recentTable"></tbody>
    </table>
  </div>

</div>

<div id="toast"></div>

<!-- school box -->

<div id="schoolBox" class="school-box">

  <div class="school-header">
    <h3>Select School</h3>
    <span class="close-btn" onclick="hideSchoolSelector()">✖</span>
  </div>

  <select id="schoolSelect">
    <option value="">Loading...</option>
  </select>

  <br><br>
  <button onclick="applySchoolChange()">Apply</button>
</div>


<script>
let school = sessionStorage.getItem("school");

document.getElementById("schoolName").innerText = "School: " + school;

/* TOAST */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

/* CLEAR */
function clearForm() {
  document.getElementById("name").value = "";
  document.getElementById("roll").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("address").value = "";
}

/* ✅ FIXED VALIDATION */
async function submitStudent() {

  const name = document.getElementById("name").value.trim();
  const cls = document.getElementById("class").value;
  const section = document.getElementById("section").value;

  console.log("DEBUG:", name, cls, section);

  if (name === "" || cls === "" || section === "") {
    showToast("Fill required fields");
    return;
  }

  const data = {
    school: school,
    name: name,
    class: cls,
    section: section,
    roll: document.getElementById("roll").value,
    phone: document.getElementById("phone").value,
    address: document.getElementById("address").value
  };

  const res = await addStudent(data);

  showToast("Student Added");

  clearForm();
  loadData();
}

/* CHANGE SCHOOL */
function changeSchool() {
  document.getElementById("schoolBox").style.display = "block";
}


/* LOAD */
async function loadData() {
  const raw = await getStudents(school);

  const headers = raw[0];
  const students = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const last3 = students.slice(-3).reverse();

  document.getElementById("recentTable").innerHTML =
    last3.map(s => `
      <tr>
        <td>${s.Name}</td>
        <td>${s.Class}</td>
        <td>${s.Section}</td>
      </tr>
    `).join("");
}

loadData();


/* Load Schools + Pre-select */
async function loadSchools() {
  const res = await fetch("schools.json");
  const data = await res.json();

  const dropdown = document.getElementById("schoolSelect");

  dropdown.innerHTML = '<option value="">Select School</option>';

  dropdown.innerHTML += data.map(s => `
    <option value="${s.School}">
      ${s.School_Name}
    </option>
  `).join("");

  // ✅ Pre-select current school
  if (school) {
    dropdown.value = school;
  }
}

loadSchools();

function hideSchoolSelector() {
  document.getElementById("schoolBox").style.display = "none";
}

// ESC close
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    hideSchoolSelector();
  }
});

// Click outside
document.addEventListener("click", function(e) {
  const box = document.getElementById("schoolBox");

  if (
    box.style.display === "block" &&
    !box.contains(e.target)
  ) {
    hideSchoolSelector();
  }
});

</script>


</body>
</html>
