<!DOCTYPE html>
<html>
<head>
  <title>Students Entry</title>
  <script src="js/protect.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  

  <link rel="stylesheet" href="css/add_student.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
<div class="page-wrapper">
<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div>
      <div class="title-text">Madhur Digitals</div>
      <div class="school-name" id="schoolNameTop"></div>
    </div>
  </div>

  <div class="nav-actions">
    <button onclick="changeSchool()">Change School</button>
    <button onclick="location.href='dashboard.html'">Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>
<div class="heading-wrapper">
  <div class="heading-badge">
    School: <span id="schoolName"></span>
  </div>
</div>
<div class="container">

  <div class="card">
    <h3>Add Student</h3>
    <div id="dynamicForm"></div>

    <div class="btn-group">
      <button type="button" class="submit-btn" onclick="submitStudent()">Submit</button>
      <button class="clear-btn" onclick="clearForm()">Clear</button>
    </div>
  </div>

  <div class="card">
    <h3>Recent Entries</h3>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Student ID</th>
            <th>Name</th>
            <th>Class</th>
            <th>Section</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="recentTable"></tbody>
      </table>
    </div>
  </div> 
</div>

<div id="toast"></div>

<!-- school box -->

<div id="schoolBox" class="school-box">

  <div class="modal">
    <div class="school-header">
      <h3>Select School</h3>
      <span class="close-btn" onclick="hideSchoolSelector()">✖</span>
    </div>

    <select id="schoolSelect">
      <option value="">Loading...</option>
    </select>

    <br><br>
    <button onclick="applySchoolChange()">Apply</button>
  </div>

</div>
<div id="editPopup" class="school-box">
  <div class="modal" id="editModalContent"></div>
</div>


<script>
let school = sessionStorage.getItem("school");
const school_name = sessionStorage.getItem("school_name");

const displayName = school_name || school;

document.getElementById("schoolName").innerText = displayName;
document.getElementById("schoolNameTop").innerText = displayName;

/* TOAST */
function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 2000);
}

function normalizeKey(str) {
  return str
    .toLowerCase()
    .replace(/[^a-z0-9]/g, "_")
    .replace(/_+/g, "_");
}

/* CLEAR */
function clearForm() {
  const inputs = document.querySelectorAll("#dynamicForm input, #dynamicForm select");

  inputs.forEach(el => {
    const id = el.id;

    // ❌ DO NOT CLEAR these
    if (id === "class" || id === "section") return;

    // ✅ CLEAR everything else
    el.value = "";
  });
  document.getElementById("name")?.focus();
}

/* ✅ FIXED VALIDATION */
let isSubmitting = false;

async function submitStudent() {
  const btn = document.querySelector(".submit-btn");
  btn.disabled = true;
  if (isSubmitting) return;   // 🚫 prevent double click
  isSubmitting = true;

  const raw = schoolsData;

  const headers = raw[0];

  const schools = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const currentSchool = schools.find(s => s.school === school);

  if (!currentSchool) {
    showToast("School config not found");
    isSubmitting = false;
    return;
  }

  const fields = currentSchool.fields.split(",");

  let data = {
    school: school,
    school_id: sessionStorage.getItem("school_id")  
  };

  let valid = true;

  fields.forEach(f => {
    const original = f.trim();
    const key = normalizeKey(original);

    const el = document.getElementById(key);
    if (!el) return;

    const value = el.value;

    if (!value && (key === "name" || key === "class" || key === "section")) {
      valid = false;
    }

    if (key === "dob") {
      data[key] = formatDOB(value);
    } else {
      data[key] = value || "";
    }
  });

  if (!valid) {
    showToast("Fill required fields");
    isSubmitting = false;
    return;
  }

  showToast("Student Added");

  // ⚡ 1. Show instantly (without ID)
  addToRecentTable(data);
  clearForm();

  addStudent(data).then(async (res) => {
    if (res && res.student_id) {

      const firstRow = document.querySelector("#recentTable tr");

      if (!firstRow) return;

      // ✅ update student_id
      firstRow.children[0].innerText = res.student_id;

      // 🔥 fetch latest data for THIS student only
      const raw = await getStudents(school);

      const headers = raw[0];

      const students = raw.slice(1).map(r => {
        let obj = {};
        headers.forEach((h, i) => obj[h] = r[i]);
        return obj;
      });

      const updated = students.find(
        s => s["Student_ID"] == res.student_id
      );

      if (!updated) return;

      // 🔥 PATCH UI (NO FULL RELOAD)
      firstRow.children[1].innerText = updated["Name"] || "";
      firstRow.children[2].innerText = updated["Class"] || "";
      firstRow.children[3].innerText = updated["Section"] || "";
      firstRow.style.background = "#d1fae5";

      setTimeout(() => {
        firstRow.style.background = "";
      }, 1000);
    }
  });
  

  isSubmitting = false;   // ✅ unlock
  btn.disabled = false;
}

/* CHANGE SCHOOL */
function changeSchool() {
  document.getElementById("schoolBox").classList.add("active");
}

function applySchoolChange() {
  const dropdown = document.getElementById("schoolSelect");
  const selectedOption = dropdown.options[dropdown.selectedIndex];

  school = selectedOption.value;
  const school_name = selectedOption.textContent.trim();
  const school_id = selectedOption.getAttribute("data-id");

  if (!school) {
    alert("Please select a school");
    return;
  }

  sessionStorage.setItem("school", school);
  sessionStorage.setItem("school_name", school_name);
  sessionStorage.setItem("school_id", school_id);

  document.getElementById("schoolName").innerText = school_name;
  document.getElementById("schoolNameTop").innerText = school_name;

  renderDynamicForm();
  loadData();

  hideSchoolSelector();
}


/* LOAD */
async function loadData() {
  const raw = await getStudents(school);

  const headers = raw[0];

  const students = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const last3 = students.slice(-3).reverse();

  document.getElementById("recentTable").innerHTML =
    last3.map(s => `
      <tr>
        <td>${s["Student_ID"] || ""}</td>
        <td>${s["Name"] || ""}</td>
        <td>${s["Class"] || ""}</td>
        <td>${s["Section"] || ""}</td>
        <td>
          <button class="edit-btn" onclick="editRecent(this, event)">Edit</button>
          <button class="delete-btn" onclick="deleteRecent(this)">Delete</button>
        </td>
      </tr>
    `).join("");
}


async function editRecent(btn, e) {
  if (e) e.stopPropagation();   // ✅ safe check

  const row = btn.closest("tr");
  const student_id = row.children[0].innerText;

  if (!student_id) {
    alert("Please wait... ID not generated yet");
    return;
  }

  openEditPopup(student_id, row);
}

function openEditPopup(student_id, row) {
  const container = document.getElementById("editModalContent");

  // ✅ STEP 1: show loading UI
  container.innerHTML = `
    <div class="school-header">
      <h3>Edit Student</h3>
      <span class="close-btn" onclick="closeEditPopup()">✖</span>
    </div>

    <p style="text-align:center; margin-top:20px;">
      ⏳ Loading student data...
    </p>
  `;

  document.getElementById("editPopup").classList.add("active");

  // ✅ STEP 2: fetch data
  loadEditData(student_id);
}

async function loadEditData(student_id) {

  const container = document.getElementById("editModalContent");

  const raw = await getStudents(school);
  const headers = raw[0];

  const students = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const student = students.find(s => s["Student_ID"] == student_id);
  if (!student) return;

  const schoolRaw = schoolsData;
  const schoolHeaders = schoolRaw[0];

  const schools = schoolRaw.slice(1).map(r => {
    let obj = {};
    schoolHeaders.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const currentSchool = schools.find(s => s.school === school);
  const fields = currentSchool.fields.split(",");

  let html = `
    <div class="school-header">
      <h3>Edit Student</h3>
      <span class="close-btn" onclick="closeEditPopup()">✖</span>
    </div>
  `;

  // ✅ Student ID
  html += `
    <div class="form-row">
      <label>Student ID</label>
      <input value="${student_id}" disabled>
    </div>
  `;

  fields.forEach(f => {
    const original = f.trim();
    const key = normalizeKey(original);

    let value = student[original] || "";

    // ✅ FIX DOB FORMAT
    if (key === "dob") {
      value = formatDOB(value);
    }

    html += `<div class="form-row"><label>${original}</label>`;

    if (key === "class") {
      html += `
        <select id="edit_${key}">
          ${CONFIG.classes.map(c =>
            `<option value="${c}" ${c == value ? "selected" : ""}>${c}</option>`
          ).join("")}
        </select>
      `;
    }

    else if (key === "section") {
      html += `
        <select id="edit_${key}">
          ${CONFIG.sections.map(s =>
            `<option value="${s}" ${s == value ? "selected" : ""}>${s}</option>`
          ).join("")}
        </select>
      `;
    }

    else {
      html += `<input id="edit_${key}" value="${value}">`;
    }

    html += `</div>`;
  });

  html += `
    <br>
    <button class="submit-btn" onclick="saveEdit(${student_id})">Save</button>
    <button class="clear-btn" onclick="closeEditPopup()">Cancel</button>
  `;

  container.innerHTML = html;
  attachDOBFormatterAll();
  attachDOBPickerAll();
}

async function saveEdit(student_id) {

  let params = new URLSearchParams({
    action: "updateStudent",
    school: school,
    student_id: student_id
  });

  const raw = schoolsData;
  const headers = raw[0];

  const schools = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const currentSchool = schools.find(s => s.school === school);
  const fields = currentSchool.fields.split(",");

  fields.forEach(f => {
    const key = normalizeKey(f.trim());
    const el = document.getElementById(`edit_${key}`);

    if (el) {
      let value = el.value || "";

      if (key === "dob") {
        value = formatDOB(value);
      }

      params.append(key, value);
    }
  });

  // 🔥 find row in table FIRST (for instant update)
  const rows = document.querySelectorAll("#recentTable tr");
  let targetRow = null;

  rows.forEach(row => {
    if (row.children[0].innerText == student_id) {
      targetRow = row;
    }
  });

  // ⚡ STEP 1: instant UI update
  if (targetRow) {
    targetRow.children[1].innerText = document.getElementById("edit_name")?.value || "";
    targetRow.children[2].innerText = document.getElementById("edit_class")?.value || "";
    targetRow.children[3].innerText = document.getElementById("edit_section")?.value || "";
  }

  showToast("Updated successfully");
  closeEditPopup();

  // 🚀 STEP 2: backend update
  await fetch(`${API_URL}?${params.toString()}`);

  // 🔥 STEP 3: fetch latest backend data
  const rawData = await getStudents(school);

  const hdrs = rawData[0];
  const students = rawData.slice(1).map(r => {
    let obj = {};
    hdrs.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  const updated = students.find(s => s["Student_ID"] == student_id);

  if (!updated || !targetRow) return;

  // 🔥 STEP 4: patch with REAL backend data
  targetRow.children[1].innerText = updated["Name"] || "";
  targetRow.children[2].innerText = updated["Class"] || "";
  targetRow.children[3].innerText = updated["Section"] || "";

  // 🔥 STEP 5: highlight
  targetRow.style.background = "#d1fae5";

  setTimeout(() => {
    targetRow.style.background = "";
  }, 1000);
}

function closeEditPopup() {
  document.getElementById("editPopup").classList.remove("active");
}

async function syncLatestData(student_id) {
  try {
    const raw = await getStudents(school);
    const headers = raw[0];

    const students = raw.slice(1).map(r => {
      let obj = {};
      headers.forEach((h, i) => obj[h] = r[i]);
      return obj;
    });

    const student = students.find(s => s["Student_ID"] == student_id);
    if (!student) return;

    Object.keys(student).forEach(key => {
      const input = document.getElementById(`edit_${normalizeKey(key)}`);
      if (input) {
        input.value = student[key] || "";
      }
    });

  } catch (err) {
    console.warn("Sync failed", err);
  }
}

async function deleteRecent(btn) {
  const row = btn.closest("tr");
  const student_id = row.children[0].innerText;

  if (!student_id) {
    alert("Please wait... ID not generated yet");
    return;
  }

  if (!confirm("Delete this student?")) return;

  const url = `${API_URL}?action=deleteStudent&school=${school}&student_id=${student_id}`;

  await fetch(url);

  row.remove();

  showToast("Deleted successfully");
}

/* Load Schools + Pre-select */

async function loadSchools() {

  const dropdown = document.getElementById("schoolSelect");

  // ✅ SHOW LOADING (optional but good UX)
  dropdown.innerHTML = "<option>Loading...</option>";

  const raw = await getSchools();

  // ✅ store globally (IMPORTANT for performance)
  schoolsData = raw;

  // safety check
  if (!raw || raw.length === 0) {
    dropdown.innerHTML = "<option>No Schools Found</option>";
    return;
  }

  const headers = raw[0];

  const schools = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  // ✅ fill dropdown
  dropdown.innerHTML = '<option value="">Select School</option>';

  dropdown.innerHTML += schools.map(s => `
    <option value="${s.school}" data-id="${s.school_id}">
      ${s.school_name}
    </option>
  `).join("");

  // ✅ pre-select current school
  const school = sessionStorage.getItem("school");

  if (school) {
    dropdown.value = school;
  }

  // ✅ VERY IMPORTANT: render form AFTER schools loaded
  renderDynamicForm();
  loadData();
}


function hideSchoolSelector() {
  document.getElementById("schoolBox").classList.remove("active");
}

// ESC close
document.addEventListener("keydown", function(e) {
  if (e.key === "Escape") {
    hideSchoolSelector();
  }
});

// Click outside
document.addEventListener("click", function(e) {
  const schoolBox = document.getElementById("schoolBox");
  const editBox = document.getElementById("editPopup");

  // SCHOOL MODAL
  if (schoolBox.classList.contains("active")) {
    const modal = schoolBox.querySelector(".modal");

    if (!modal.contains(e.target)) {
      hideSchoolSelector();
    }
  }

  // EDIT MODAL
  if (editBox.classList.contains("active")) {
    const modal = editBox.querySelector(".modal");

    if (!modal.contains(e.target)) {
      closeEditPopup();
    }
  }
});

async function renderDynamicForm() {

  const raw = schoolsData;  // get data from Google Sheet

  const headers = raw[0];

  const schools = raw.slice(1).map(r => {
    let obj = {};
    headers.forEach((h, i) => obj[h] = r[i]);
    return obj;
  });

  // find current school
  const currentSchool = schools.find(s => s.school === school);

  if (!currentSchool) return;

  const fields = currentSchool.fields.split(",");

  const container = document.getElementById("dynamicForm");
  container.innerHTML = "";

  fields.forEach(f => {
    const original = f.trim();
    const key = normalizeKey(original);

    let html = "";

    if (key === "dob") {
      html = `
        <div class="form-row">
          <label>${original}</label>
          <input id="${key}" placeholder="DD/MM/YYYY" inputmode="numeric">
        </div>
      `;
    } else {
      html = `
        <div class="form-row">
          <label>${original}</label>
          <input id="${key}">
        </div>
      `;
    }

    // special case for class and section dropdown
    // 🔥 CLASS DROPDOWN
    if (key === "class") {
      html = `
        <div class="form-row">
          <label>Class</label>
          <select id="class">
            <option value="">Select Class</option>
            ${CONFIG.classes.map(c => `<option value="${c}">${c}</option>`).join("")}
          </select>
        </div>
      `;
    }

    // 🔥 SECTION DROPDOWN
    else if (key === "section") {
      html = `
        <div class="form-row">
          <label>Section</label>
          <select id="section">
            <option value="">Select Section</option>
            ${CONFIG.sections.map(s => `<option value="${s}">${s}</option>`).join("")}
          </select>
        </div>
      `;
    }
    container.innerHTML += html;
  });
  attachDOBFormatterAll();
  attachDOBPickerAll();
}

function addToRecentTable(data) {
  const table = document.getElementById("recentTable");

  const row = `
    <tr>
      <td>${data.student_id || ""}</td>
      <td>${data.name || ""}</td>
      <td>${data.class || ""}</td>
      <td>${data.section || ""}</td>
      <td>
        <button class="edit-btn" onclick="editRecent(this, event)">Edit</button>
        <button class="delete-btn" onclick="deleteRecent(this)">Delete</button>
      </td>
    </tr>
  `;

  // ✅ add new row at top
  table.innerHTML = row + table.innerHTML;

  // ✅ keep only last 3 rows
  const rows = table.querySelectorAll("tr");
  if (rows.length > 3) {
    rows[rows.length - 1].remove();
  }
}

loadSchools();   // first load schools + form

function formatDOB(value) {
  if (!value) return "";

  let str = value.toString().trim();

  // replace - with /
  str = str.replace(/-/g, "/");

  // remove all non-digits
  let digits = str.replace(/\D/g, "");

  // 🔥 Case 1: 8 digit input (12072001)
  if (digits.length === 8) {
    let day = digits.substring(0, 2);
    let month = digits.substring(2, 4);
    let year = digits.substring(4, 8);

    return `${day}/${month}/${year}`;
  }

  // 🔥 Case 2: split input (12/7/2001 etc.)
  let parts = str.split("/");

  if (parts.length === 3) {
    let [day, month, year] = parts;

    day = String(day).padStart(2, "0");
    month = String(month).padStart(2, "0");

    return `${day}/${month}/${year}`;
  }

  return str;
}

</script>
<footer>
  <div class="footer-inner">
    © 2026 Madhur Digitals | All Rights Reserved
  </div>
</footer>     
</div> 
</body>
</html>
