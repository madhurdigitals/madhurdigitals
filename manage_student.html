<!DOCTYPE html>
<html>
<head>
  <title>Manage Students</title>

  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/manage_student.js" defer></script>

  <link rel="stylesheet" href="css/manage_student.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<div class="page-wrapper">

<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div>
      <div class="title-text">Madhur Digitals</div>
      <div class="school-name" id="schoolNameTop"></div>
    </div>
  </div>

  <div class="nav-actions">
    <button onclick="changeSchool()">Change School</button>
    <button onclick="location.href='dashboard.html'">Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- ✅ SAME BADGE AS ADD STUDENT -->
<div class="heading-wrapper">
  <div class="heading-badge">
    Manage Students - <span id="schoolName"></span>
  </div>
</div>

<div class="container">

  <!-- FILTER CARD -->
  <div class="card">
    <h3>Filters</h3>

    <input id="searchName" class="search-input" placeholder="Search Name">

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-top:10px;">

      <div class="dropdown">
        <button onclick="toggleDropdown('classSectionDropdown')">
          Select Class-Section
        </button>
        <div id="classSectionDropdown" class="dropdown-content"></div>
      </div>

      <div id="selectedChips"></div>

    </div>
  </div>

  <!-- TABLE CARD -->
  <div class="card">

    <div class="table-wrapper">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>

    <div id="pagination"></div>

    <div style="margin-top:10px;">
      <input type="number" id="pageInput" placeholder="Go to page">
      <button onclick="jumpToPage()">Go</button>
    </div>

  </div>

</div>

<!-- ✅ SAME MODAL SYSTEM -->
<div id="editPopup" class="school-box">
  <div class="modal" id="editModalContent"></div>
</div>

<footer>
  <div class="footer-inner">
    © 2026 Madhur Digitals | All Rights Reserved
  </div>
</footer>

</div>

</body>
</html>
