<!DOCTYPE html>
<html>
<head>
  <title>Manage Students</title>
  <script src="js/protect.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/manage_student.js" defer></script>

  <link rel="stylesheet" href="css/manage_student.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div>
      <div class="title-text">Madhur Digitals</div>
      <div class="school-name" id="schoolNameTop"></div>
    </div>
  </div>

  <div class="nav-actions">
    <button onclick="changeSchool()">Change School</button>
    <button onclick="location.href='dashboard.html'">Dashboard</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<h2>Manage Students - <span id="schoolName"></span></h2>

<div class="container">

  <!-- Filters -->
  <div class="card">
    <h3>Filters</h3>

    <!-- Name -->
    <input id="searchName" placeholder="🔍 Search student by name..." class="search-input">

    <!-- Class-Section Filter -->
    <div style="display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:10px;">

      <!-- Button -->
      <div class="dropdown">
        <button onclick="toggleDropdown('classSectionDropdown')">
          Select Class-Section
        </button>
        <div id="classSectionDropdown" class="dropdown-content"></div>
      </div>

      <!-- 🔥 Selected Chips -->
      <div id="selectedChips" style="display:flex; gap:5px; flex-wrap:wrap;"></div>

    </div>
  </div>

  </div>

  <!-- Table -->
  <div class="card">
    <div id="paginationTop" style="margin-bottom:10px;"></div>
    <div class="table-wrapper">
      <table>
        <thead id="tableHead"></thead>
        <tbody id="studentTable"></tbody>
      </table>
    </div>
    <!-- ✅ SINGLE pagination -->
    <div id="pagination" style="margin-top:10px;"></div>

    <!-- ✅ Jump to page -->
    <div style="margin-top:10px;">
      <input type="number" id="pageInput" placeholder="Go to page" min="1">
      <button onclick="jumpToPage()">Go</button>
    </div>

  </div>

</div>

<!-- EDIT POPUP -->
 <div id="editPopup" class="school-box"></div>
<div id="schoolBox" class="school-box">
  <div>
    <div class="school-header">
      <h3>Select School</h3>
      <span class="close-btn" onclick="hideSchoolSelector()">✖</span>
    </div>

    <select id="schoolSelect">
      <option value="">Loading...</option>
    </select>

    <br><br>
    <button onclick="applySchoolChange()">Apply</button>
  </div>
</div>

</body>
</html>
