<!DOCTYPE html>
<html>
<head>
  <title>Restore Students</title>

  <script src="js/api.js"></script>
  <script src="js/restore_student.js" defer></script>

  <link rel="stylesheet" href="css/manage_student.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<nav>
  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
    <div class="title-text">Madhur Digitals</div>
  </div>
</nav>

<h2>Restore Students</h2>

<div class="container">

  <div class="card">
    <input id="searchName" placeholder="Search Name">
    <input id="searchClass" placeholder="Search Class">

    <select id="searchSection">
      <option value="">All Sections</option>
      <option>A</option>
      <option>B</option>
      <option>C</option>
    </select>

    <select id="searchSchool">
      <option value="">All Schools</option>
    </select>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Class</th>
          <th>Section</th>
          <th>School</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="studentTable"></tbody>
    </table>
  </div>

</div>

</body>
</html>
