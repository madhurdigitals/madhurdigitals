<!DOCTYPE html>
<html>
<head>
  <title>School Forms</title>

  <script src="js/protect.js"></script>
  <script src="js/api.js"></script>
  <script src="js/school_form.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <link rel="stylesheet" href="css/school_form.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<div class="page-wrapper">

  <!-- NAVBAR -->
  <nav>
    <div class="logo">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
      <div>
        <div class="title-text">Madhur Digitals</div>
        <div class="school-name" id="schoolNameTop"></div>
      </div>
    </div>

    <div class="nav-actions">
      <button onclick="location.href='dashboard.html'">Dashboard</button>
      <button onclick="logout()">Logout</button>
    </div>
  </nav>

  <!-- HEADING -->
  <div class="heading-wrapper">
    <div class="heading-badge">
      School: <span id="schoolName"></span>
    </div>
  </div>

  <!-- SETTINGS (CENTERED) -->
  <div class="container settings-container">

    <div class="card">
      <h3>Print School Forms</h3>

      <div id="fieldSettings"></div>

      <hr>

      <h4>Add Custom Field</h4>
      <input type="text" id="customFieldInput" placeholder="Enter field name">
      <button onclick="addCustomField()">Add</button>

      <div id="customFieldList"></div>

      <br>

      <div class="form-group">
        <label for="headerColor">Header Color</label>
        <select id="headerColor">
          <option value="light">Light</option>
          <option value="medium">Medium</option>
          <option value="dark">Dark</option>
        </select>
      </div>

      <br>

      <button onclick="generateForms()" class="submit-btn">
        Generate Forms
      </button>

      <button onclick="resetFields()" class="clear-btn">
        Reset
      </button>
    </div>

  </div>

  <!-- PRINT SECTION (FULL WIDTH) -->
  <div id="formSection" class="print-container" style="display:none;">

    <div class="a4-wrapper">

      <button onclick="window.print()" class="submit-btn print-btn">
        Print
      </button>

      <div id="formContainer"></div>

    </div>

  </div>

  <!-- FOOTER -->
  <footer>
    © 2026 Madhur Digitals | All Rights Reserved
  </footer>

</div>

</body>
</html>
