<!DOCTYPE html>
<html>
<head>
  <title>School Forms</title>

  <script src="js/protect.js"></script>
  <script src="js/api.js"></script>
  <script src="js/school_form.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

  <link rel="stylesheet" href="css/school_form.css">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<h2>Print School Forms</h2>

<div class="container">

  <!-- FIELD SETTINGS -->
  <div class="card">

    <h3>Field Settings</h3>

    <div id="fieldSettings"></div>

    <hr>

    <h4>Add Custom Field</h4>
    <input type="text" id="customFieldInput" placeholder="Enter field name">
    <button onclick="addCustomField()">Add</button>

    <div id="customFieldList"></div>

    <br>
    <div class="form-group">
      <label for="headerColor">Header Color</label>
      <select id="headerColor">
        <option value="light">Light</option>
        <option value="medium">Medium</option>
        <option value="dark">Dark</option>
      </select>
    </div>

    <br>
    <button onclick="generateForms()" class="submit-btn">
      Generate Forms
    </button>

    <button onclick="resetFields()" class="submit-btn reset-btn">
      Reset
    </button>

  </div>

  <!-- PRINT SECTION -->
  <div id="formSection" class="card" style="display:none;">
    <button onclick="window.print()" class="submit-btn">Print</button>

    <div id="formContainer"></div>
  </div>

</div>

</body>
</html>
