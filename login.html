<!DOCTYPE html>
<html>
<head>
  <title>Login - Madhur Digitals</title>
  <script src="js/auth.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0d6efd, #4dabf7);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* LOGIN BOX */
.login-box {
  background: white;
  padding: 30px;
  border-radius: 12px;
  width: 320px;
  text-align: center;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

.logo {
  margin-bottom: 15px;
}

.logo img {
  width: 50px;
}

h2 {
  margin-bottom: 20px;
  color: #0d6efd;
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #0d6efd;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: #0b5ed7;
}

/* ERROR */
#error {
  color: red;
  font-size: 14px;
  margin-top: 10px;
}

/* MOBILE */
@media (max-width: 400px) {
  .login-box {
    width: 90%;
  }
}
</style>

</head>

<body>

<div class="login-box">

  <div class="logo">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">
  </div>

  <h2>Madhur Digitals</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="handleLogin()">Login</button>

  <div id="error"></div>

</div>

<script>

/* LOGIN HANDLER */
function handleLogin() {
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  if (login(username, password)) {
    window.location.href = "home.html"; // 🔥 UPDATED FLOW
  } else {
    document.getElementById("error").innerText = "Invalid username or password";
  }
}

/* ENTER KEY SUPPORT */
document.getElementById("password").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    handleLogin();
  }
});
</script>

</body>
</html>
